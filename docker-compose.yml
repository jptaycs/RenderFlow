# Datastores only: Postgres (users/projects/jobs) and Redis (Celery broker).
# The API server and Celery worker run on the host from .venv — the pipeline
# needs host ffmpeg and the local model dirs (.wav2lip/, .kokoro/, .voices/).
#
#   docker compose up -d        # start (needs Docker Desktop or `colima start`)
#   docker compose down         # stop (data persists in the named volumes)
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: renderflow
      # Interpolated from .env in this directory (docker compose reads it
      # automatically). Dev falls back to the default; production sets
      # RENDERFLOW_PG_PASSWORD (and the matching RENDERFLOW_DATABASE_URL) —
      # the API refuses to start in production on the default password.
      POSTGRES_PASSWORD: ${RENDERFLOW_PG_PASSWORD:-renderflow}
      POSTGRES_DB: renderflow
    ports:
      # 5433 on the host: a brew postgresql@16 LaunchAgent already owns 5432
      # on this machine (and an SSH tunnel owned 6379) — RenderFlow's
      # datastores stay off the default ports to never collide with them.
      - "127.0.0.1:5433:5432"
    volumes:
      - renderflow_pg:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - renderflow_redis:/data

volumes:
  renderflow_pg:
  renderflow_redis:
