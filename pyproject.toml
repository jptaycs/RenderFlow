[project]
name = "renderflow"
version = "0.1.0"
description = "AI video production orchestration platform"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.50",
    "replicate>=1.0",
    "httpx>=0.27",
    "pydantic>=2.7",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["renderflow*"]
